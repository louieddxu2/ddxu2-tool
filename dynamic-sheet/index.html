<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>動態表單中心 (Grid版)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.542.0"></script>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='8' fill='%233b82f6'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* 隱藏全域滾動條，但保留表格的滾動條以便滑動 */
    ::-webkit-scrollbar { width: 4px; height: 4px; background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    body { -webkit-tap-highlight-color: transparent; }
    
    /* 底部彈出窗動畫 */
    .bottom-sheet {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateY(100%);
    }
    .bottom-sheet.open {
      transform: translateY(0);
    }
    
    /* 側欄動畫 */
    .sidebar {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }

    /* 試算表專用樣式 */
    table {
      border-spacing: 0;
    }
    /* 讓左上角那格永遠固定在最上層 */
    .sticky-corner {
      position: sticky;
      top: 0;
      left: 0;
      z-index: 30;
      background-color: #f1f5f9; /* slate-100 */
    }
    /* 固定頂部標題列 */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background-color: #f8fafc; /* slate-50 */
    }
    /* 固定左側第一欄 (物件名稱) */
    .sticky-col {
      position: sticky;
      left: 0;
      z-index: 10;
      background-color: #f1f5f9; /* slate-100 */
    }
    /* 表格點擊回饋 */
    td.data-cell:active {
      background-color: #dbeafe !important; /* blue-100 */
    }
  </style>
</head>
<body class="bg-white text-slate-800 h-screen flex flex-col overflow-hidden relative">

  <script>
    (function autoRegister() {
      let appPath = window.location.pathname;
      if (appPath.endsWith('index.html')) appPath = appPath.replace('index.html', '');
      if (!appPath.endsWith('/')) appPath += '/';
      if (appPath === '/') return;
      const launcherPath = appPath.replace(/[^/]+\/$/, '');
      document.querySelectorAll('[data-home-link]').forEach(el => el.setAttribute('href', launcherPath || '/'));
      const appMeta = { id: 'dynamic-sheet-hub', name: '動態表單', nameZh: '動態表單', nameEn: 'Sheet Hub', path: appPath, icon: 'table', color: 'blue' };
      const storageKey = 'myAppLauncherStorage';
      const launcherData = JSON.parse(localStorage.getItem(storageKey) || '[]');
      const existingIndex = launcherData.findIndex(app => app.path === appMeta.path);
      if (existingIndex === -1) launcherData.push(appMeta);
      else launcherData[existingIndex] = { ...launcherData[existingIndex], ...appMeta };
      localStorage.setItem(storageKey, JSON.stringify(launcherData));
    })();
  </script>

  <header class="bg-blue-600 text-white p-3 shadow-md z-40 flex flex-shrink-0 items-center justify-between">
    <div class="flex items-center gap-2">
      <button id="btn-menu" class="p-2 -ml-2 hover:bg-blue-700 rounded-full transition-colors">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
      <h1 id="header-title" class="text-base font-bold tracking-tight">桌遊收藏紀錄</h1>
    </div>
    <div class="flex gap-1">
      <button class="p-2 hover:bg-blue-700 rounded-full transition-colors">
        <i data-lucide="plus" class="w-5 h-5"></i>
      </button>
      <button id="btn-sync" class="p-2 hover:bg-blue-700 rounded-full transition-colors">
        <i data-lucide="cloud-off" class="w-5 h-5 text-blue-200"></i>
      </button>
    </div>
  </header>

  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity"></div>
  <aside id="sidebar" class="sidebar fixed top-0 left-0 bottom-0 w-64 bg-white z-50 shadow-xl flex flex-col">
    <div class="p-4 bg-slate-100 border-b"><h2 class="font-bold text-slate-700">選擇試算表分頁</h2></div>
    <div class="flex-grow p-2">
      <button class="w-full text-left p-3 rounded-xl bg-blue-50 text-blue-700 font-medium flex items-center gap-2">
        <i data-lucide="table-2" class="w-4 h-4"></i> 桌遊收藏 (Mock)
      </button>
    </div>
  </aside>

  <main class="flex-grow w-full overflow-auto relative bg-slate-50" id="main-content">
    </main>


  <div id="editor-overlay" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity"></div>
  <div id="editor-sheet" class="bottom-sheet fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-3xl z-50 shadow-2xl flex flex-col" style="max-height: 85vh;">
    <div class="p-4 border-b flex items-center justify-between">
      <div>
        <h3 id="editor-title" class="font-bold text-lg text-slate-800">編輯屬性</h3>
        <p id="editor-subtitle" class="text-xs text-slate-500">對象名稱</p>
      </div>
      <button id="btn-close-editor" class="p-2 bg-slate-100 rounded-full text-slate-600 active:bg-slate-200">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <div id="editor-body" class="p-4 overflow-y-auto flex-grow flex flex-col gap-4">
      </div>
  </div>


  <script>
    lucide.createIcons();

    // 1. 架構定義 (與試算表欄位對應)
    const schema = {
      name: { label: '遊戲名稱', type: 'text' },
      price: { label: '購入價格', type: 'number' },
      status: { label: '持有狀態', type: 'select', options: ['未發貨', '已持有', '已售出', '願望清單'] },
      rating: { label: '個人評分', type: 'select', options: ['1', '2', '3', '4', '5'] },
      note: { label: '備註', type: 'text' }
    };

    // 假資料 (為了讓你看出表格效果，我多加了幾筆)
    let tableData = [
      { id: '1', name: 'Gloomhaven (幽港迷城)', price: 3500, status: '已持有', rating: '5', note: '超重' },
      { id: '2', name: 'Frosthaven', price: 5000, status: '未發貨', rating: '', note: '等好久' },
      { id: '3', name: '璀璨寶石', price: 1200, status: '已售出', rating: '3', note: '' },
      { id: '4', name: '卡卡頌', price: 800, status: '已持有', rating: '4', note: '基礎版' },
      { id: '5', name: '阿瓦隆', price: 450, status: '已持有', rating: '5', note: '常開' },
      { id: '6', name: '沙丘：帝國', price: 1600, status: '願望清單', rating: '', note: '' },
      { id: '7', name: '詭鎮奇談：卡牌版', price: 1350, status: '已持有', rating: '4', note: '大坑' },
    ];

    // 2. 編輯器工廠 (不變，準備應付未來擴充)
    const EditorFactory = {
      text: (value) => `
        <input type="text" id="input-text" value="${value || ''}" class="w-full p-4 bg-slate-100 rounded-xl text-lg outline-none focus:ring-2 focus:ring-blue-500">
        <button id="btn-save" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-4 active:scale-95 transition-transform">儲存</button>
      `,
      number: (value) => `
        <input type="number" id="input-number" value="${value || ''}" placeholder="0" class="w-full p-4 bg-slate-100 rounded-xl text-2xl font-bold text-center outline-none focus:ring-2 focus:ring-blue-500">
        <button id="btn-save" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-4 active:scale-95 transition-transform">儲存</button>
      `,
      select: (value, options) => {
        let html = '<div class="flex flex-col gap-3">';
        options.forEach(opt => {
          const bgClass = (opt === value) ? 'bg-blue-600 text-white shadow-md border-blue-600' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50';
          html += `<button class="btn-select-option w-full py-4 rounded-2xl border text-lg font-bold transition-all active:scale-95 ${bgClass}" data-val="${opt}">${opt}</button>`;
        });
        html += '</div>';
        return html;
      }
    };

    // 3. UI 渲染邏輯：渲染成純粹的試算表二維 Grid
    const mainContent = document.getElementById('main-content');

    function renderGrid() {
      // 建立 table 結構，文字設定為不換行 (whitespace-nowrap) 以維持表格俐落感
      let html = '<table class="w-full text-sm whitespace-nowrap">';
      
      // --- 表頭 (X軸屬性) ---
      html += '<thead><tr>';
      // 左上角固定格 (留給物件名稱的標題)
      html += `<th class="sticky-corner border-b border-r border-slate-300 p-3 text-left text-slate-500 font-bold min-w-[120px] shadow-sm">物件名稱</th>`;
      
      Object.keys(schema).forEach(key => {
        if (key === 'name') return;
        html += `<th class="sticky-header border-b border-r border-slate-300 p-3 text-center text-slate-500 font-bold min-w-[100px] shadow-sm">${schema[key].label}</th>`;
      });
      html += '</tr></thead>';

      // --- 表格內容 (Y軸物件 + 交叉點數據) ---
      html += '<tbody>';
      tableData.forEach((row, rowIndex) => {
        html += '<tr>';
        
        // 第一欄：物件名稱 (固定在左側)
        html += `<td class="sticky-col border-b border-r border-slate-300 p-3 font-bold text-slate-800 shadow-sm max-w-[150px] overflow-hidden text-ellipsis">${row.name}</td>`;
        
        // 其他欄位：資料單元格 (點擊觸發編輯器)
        Object.keys(schema).forEach(key => {
          if (key === 'name') return;
          const val = row[key] || '';
          html += `<td class="data-cell border-b border-r border-slate-200 p-3 text-center text-slate-700 transition-colors cursor-pointer bg-white" onclick="openEditor(${rowIndex}, '${key}')">${val}</td>`;
        });
        html += '</tr>';
      });
      
      // 新增一列空白列，方便使用者覺得表格還沒結束 (可選)
      html += `<tr><td class="sticky-col border-b border-r border-slate-300 p-3 text-blue-600 font-medium cursor-pointer">+ 新增物件</td>`;
      Object.keys(schema).forEach(key => {
        if (key === 'name') return;
        html += `<td class="border-b border-r border-slate-200 p-3 bg-slate-50"></td>`;
      });
      html += '</tr>';

      html += '</tbody></table>';
      mainContent.innerHTML = html;
    }


    // 4. 編輯器互動邏輯 (Bottom Sheet)
    const editorSheet = document.getElementById('editor-sheet');
    const editorOverlay = document.getElementById('editor-overlay');
    const editorBody = document.getElementById('editor-body');

    function openEditor(rowIndex, attrKey) {
      const row = tableData[rowIndex];
      const attrConfig = schema[attrKey];
      
      document.getElementById('editor-title').innerText = `編輯：${attrConfig.label}`;
      document.getElementById('editor-subtitle').innerText = row.name;

      const currentVal = row[attrKey];
      
      if (attrConfig.type === 'select') {
        editorBody.innerHTML = EditorFactory.select(currentVal, attrConfig.options);
        document.querySelectorAll('.btn-select-option').forEach(btn => {
          btn.addEventListener('click', (e) => saveData(rowIndex, attrKey, e.target.getAttribute('data-val')));
        });
      } 
      else if (attrConfig.type === 'text') {
        editorBody.innerHTML = EditorFactory.text(currentVal);
        const input = document.getElementById('input-text');
        input.focus();
        document.getElementById('btn-save').addEventListener('click', () => saveData(rowIndex, attrKey, input.value));
      }
      else if (attrConfig.type === 'number') {
        editorBody.innerHTML = EditorFactory.number(currentVal);
        const input = document.getElementById('input-number');
        input.focus();
        document.getElementById('btn-save').addEventListener('click', () => saveData(rowIndex, attrKey, input.value));
      }

      editorOverlay.classList.remove('hidden');
      setTimeout(() => {
        editorOverlay.classList.remove('opacity-0');
        editorSheet.classList.add('open');
      }, 10);
    }

    function closeEditor() {
      editorSheet.classList.remove('open');
      editorOverlay.classList.add('opacity-0');
      setTimeout(() => editorOverlay.classList.add('hidden'), 300);
    }

    function saveData(rowIndex, attrKey, newValue) {
      tableData[rowIndex][attrKey] = newValue;
      renderGrid(); // 重新繪製表格
      closeEditor();
    }

    document.getElementById('btn-close-editor').addEventListener('click', closeEditor);
    editorOverlay.addEventListener('click', closeEditor);

    // 5. 側邊欄互動邏輯 (維持)
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    function toggleSidebar() {
      if (sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.add('opacity-0');
        setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
      } else {
        sidebarOverlay.classList.remove('hidden');
        setTimeout(() => {
          sidebarOverlay.classList.remove('opacity-0');
          sidebar.classList.add('open');
        }, 10);
      }
    }
    document.getElementById('btn-menu').addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // 6. 初始化執行
    renderGrid();

  </script>
</body>
</html>

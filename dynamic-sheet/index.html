<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>動態表單中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.542.0"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    tailwind.config = { darkMode: "class" };
  </script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='8' fill='%233b82f6'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#3b82f6">
  <style>
    ::-webkit-scrollbar { width: 4px; height: 4px; background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
    .sidebar { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    table { border-spacing: 0; }
    .sticky-corner { position: sticky; top: 0; left: 0; z-index: 30; }
    .sticky-header { position: sticky; top: 0; z-index: 20; }
    .sticky-col { position: sticky; left: 0; z-index: 10; }
    td.data-cell:active, th.clickable:active, td.clickable:active { filter: brightness(0.95); }
  </style>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 h-screen flex flex-col overflow-hidden">
  <script>
    (function autoRegister() {
      let appPath = window.location.pathname;
      if (appPath.endsWith("index.html")) appPath = appPath.replace("index.html", "");
      if (!appPath.endsWith("/")) appPath += "/";
      if (appPath === "/") return;
      const launcherPath = appPath.replace(/[^/]+\/$/, "");
      document.querySelectorAll("[data-home-link]").forEach((el) => el.setAttribute("href", launcherPath || "/"));
      const appMeta = {
        id: "dynamic-sheet-hub",
        name: "動態表單",
        nameZh: "動態表單",
        nameEn: "Sheet Hub",
        path: appPath,
        icon: "table",
        color: "blue"
      };
      const storageKey = "myAppLauncherStorage";
      const launcherData = JSON.parse(localStorage.getItem(storageKey) || "[]");
      const existingIndex = launcherData.findIndex((app) => app.path === appMeta.path);
      if (existingIndex === -1) launcherData.push(appMeta);
      else launcherData[existingIndex] = { ...launcherData[existingIndex], ...appMeta };
      localStorage.setItem(storageKey, JSON.stringify(launcherData));
    })();
  </script>

  <header class="bg-blue-600 dark:bg-slate-800 text-white p-3 shadow-md z-40 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <button id="btn-menu" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-colors">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
      <h1 class="text-base font-bold tracking-tight">動態表單中心</h1>
    </div>
    <div class="flex gap-1">
      <button id="btn-search" class="p-2 hover:bg-white/20 rounded-full transition-colors" title="查詢">
        <i data-lucide="search" class="w-5 h-5"></i>
      </button>
      <button id="btn-theme" class="p-2 hover:bg-white/20 rounded-full transition-colors" title="深色模式">
        <i data-lucide="moon" id="icon-theme" class="w-5 h-5"></i>
      </button>
      <button id="btn-add-column" class="p-2 hover:bg-white/20 rounded-full transition-colors" title="新增欄位">
        <i data-lucide="columns" class="w-5 h-5"></i>
      </button>
    </div>
  </header>

  <div id="search-bar" class="hidden flex-shrink-0 bg-slate-100 dark:bg-slate-800 p-2 px-4 border-b border-slate-200 dark:border-slate-700 flex items-center shadow-inner">
    <i data-lucide="search" class="w-5 h-5 text-slate-400 mr-2 flex-shrink-0"></i>
    <input type="text" id="input-search" placeholder="查詢任何欄位..." class="flex-grow bg-transparent border-none outline-none text-slate-800 dark:text-slate-100 placeholder-slate-400">
    <button id="btn-clear-search" class="p-1 ml-2 text-slate-400 hover:text-slate-600 transition-colors">
      <i data-lucide="x-circle" class="w-5 h-5"></i>
    </button>
  </div>

  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity"></div>
  <aside id="sidebar" class="sidebar fixed top-0 left-0 bottom-0 w-72 bg-white dark:bg-slate-900 z-50 shadow-xl flex flex-col">
    <div class="p-4 bg-slate-100 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
      <h2 class="font-bold text-slate-700 dark:text-slate-200">資料來源與同步</h2>
    </div>
    <div class="flex-grow p-3 space-y-4 overflow-y-auto">
      <div class="rounded-xl border border-slate-200 dark:border-slate-700 p-3">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs text-slate-500">Drawer 目錄</p>
          <div class="flex gap-1">
            <button id="btn-new-folder" class="px-2 py-1 text-[11px] bg-slate-100 dark:bg-slate-800 rounded-md border border-slate-200 dark:border-slate-700">+ Folder</button>
            <button id="btn-new-sheet" class="px-2 py-1 text-[11px] bg-slate-100 dark:bg-slate-800 rounded-md border border-slate-200 dark:border-slate-700">+ Sheet</button>
          </div>
        </div>
        <div id="drawer-tree" class="max-h-44 overflow-y-auto pr-1"></div>
      </div>

      <div class="rounded-xl border border-slate-200 dark:border-slate-700 p-3 space-y-2">
        <p class="text-xs text-slate-500 mb-1">Google 帳戶</p>
        <p id="google-auth-status" class="text-sm font-semibold text-amber-600">尚未連結 Google 帳戶</p>
        <p id="google-auth-detail" class="text-xs text-slate-500">請先設定 Client ID，並完成帳戶授權</p>
        <div class="grid grid-cols-2 gap-2 pt-1">
          <button id="btn-google-connect" class="px-2 py-2 text-xs bg-blue-600 text-white rounded-lg">連結帳戶</button>
          <button id="btn-google-disconnect" class="px-2 py-2 text-xs bg-slate-100 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">中斷連線</button>
          <button id="btn-google-find" class="px-2 py-2 text-xs bg-slate-100 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">尋找試算表</button>
          <button id="btn-google-link-url" class="px-2 py-2 text-xs bg-slate-100 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">貼網址連結</button>
        </div>
        <button id="btn-google-config" class="w-full px-2 py-2 text-xs bg-white dark:bg-slate-900 rounded-lg border border-dashed border-slate-300 dark:border-slate-600">
          設定 Google API（Client ID / API Key）
        </button>
      </div>

      <div class="rounded-xl border border-slate-200 dark:border-slate-700 p-3">
        <p class="text-xs text-slate-500 mb-1">同步狀態</p>
        <p id="sync-status" class="text-sm font-semibold text-amber-600">未連線 adapter</p>
        <p id="pending-count" class="text-xs text-slate-500 mt-1">待同步 0 筆</p>
      </div>

      <button id="btn-sync-now" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-semibold transition-colors">
        立即同步
      </button>
      <button id="btn-reset-data" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 py-2.5 rounded-xl font-semibold transition-colors">
        清除本地資料
      </button>
    </div>
  </aside>

  <main id="main-content" class="flex-grow w-full overflow-auto relative bg-slate-50 dark:bg-slate-900 pb-20"></main>

  <button id="btn-add-row" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center active:scale-95 transition-transform z-30">
    <i data-lucide="plus" class="w-6 h-6"></i>
  </button>

  <div id="editor-overlay" class="fixed inset-0 z-40 hidden flex items-center justify-center bg-black/20">
    <div id="editor-sheet" class="w-[92%] max-w-sm bg-white/90 dark:bg-slate-800/90 backdrop-blur-md rounded-3xl shadow-xl flex flex-col transform scale-95 opacity-0 transition-all duration-200 border border-white/30 dark:border-slate-700/50" style="max-height: 86vh;">
      <div class="p-4 border-b border-slate-200/50 dark:border-slate-700/50 flex items-center justify-between">
        <div>
          <h3 id="editor-title" class="font-bold text-lg text-slate-800 dark:text-white">編輯</h3>
          <p id="editor-subtitle" class="text-xs text-slate-500 dark:text-slate-300">設定</p>
        </div>
        <button id="btn-close-editor" class="p-2 bg-slate-200/50 dark:bg-slate-700/50 rounded-full text-slate-600 dark:text-slate-200 active:scale-95 transition-transform">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div id="editor-body" class="p-4 overflow-y-auto flex-grow flex flex-col gap-4"></div>
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>

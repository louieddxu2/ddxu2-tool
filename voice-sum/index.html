<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voice Sum</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.542.0"></script>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='8' fill='%233b82f6'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    ::-webkit-scrollbar { width: 0; background: transparent; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
  <script>
    (function autoRegister() {
      let appPath = window.location.pathname;
      if (appPath.endsWith('index.html')) appPath = appPath.replace('index.html', '');
      if (!appPath.endsWith('/')) appPath += '/';
      if (appPath === '/') return;

      try {
        localStorage.setItem('myAppLauncherLastPath', appPath);
        localStorage.setItem('myAppLauncherLastSeenAt', String(Date.now()));
      } catch {}

      const launcherPath = appPath.replace(/[^/]+\/$/, '');
      const normalizedLauncherPath = launcherPath || '/';

      function configureHomeLinkAndProbe() {
        const homeLinks = Array.from(document.querySelectorAll('[data-home-link]'));
        const spacer = document.getElementById('header-spacer');
        const homeHref = normalizedLauncherPath.includes('?')
          ? `${normalizedLauncherPath}&home=1`
          : `${normalizedLauncherPath}?home=1`;

        homeLinks.forEach(el => el.setAttribute('href', homeHref));

        if (window.location.protocol === 'file:') return;

        const probeUrl = normalizedLauncherPath.endsWith('/')
          ? `${normalizedLauncherPath}index.html`
          : `${normalizedLauncherPath}/index.html`;

        const revealHome = () => {
          homeLinks.forEach(el => el.classList.remove('invisible', 'pointer-events-none'));
          if (spacer) spacer.classList.remove('hidden');
        };

        fetch(probeUrl, { method: 'HEAD' })
          .then(res => {
            if (res.ok) {
              revealHome();
              return;
            }
            if (res.status === 405) {
              return fetch(probeUrl, { method: 'GET' }).then(r => { if (r.ok) revealHome(); });
            }
          })
          .catch(() => {});
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', configureHomeLinkAndProbe, { once: true });
      } else {
        configureHomeLinkAndProbe();
      }

      const appMeta = {
        id: 'voice-sum',
        name: '\u8A9E\u97F3\u52A0\u7E3D',
        nameZh: '\u8A9E\u97F3\u52A0\u7E3D',
        nameEn: 'Voice Sum',
        path: appPath,
        icon: 'mic',
        color: 'blue'
      };

      const storageKey = 'myAppLauncherStorage';
      const launcherData = JSON.parse(localStorage.getItem(storageKey) || '[]');
      const existingIndex = launcherData.findIndex(app => app.path === appMeta.path);
      if (existingIndex === -1) launcherData.push(appMeta);
      else launcherData[existingIndex] = { ...launcherData[existingIndex], ...appMeta };
      localStorage.setItem(storageKey, JSON.stringify(launcherData));
    })();
  </script>

  <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-20">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <a href="/" data-home-link class="p-2 -ml-2 hover:bg-blue-700 rounded-full transition-colors invisible pointer-events-none" aria-label="Home">
        <i data-lucide="home" class="w-5 h-5"></i>
      </a>
      <div class="flex items-center gap-2">
        <span id="status-dot" class="inline-block w-2.5 h-2.5 rounded-full bg-white/40"></span>
        <h1 id="title" class="text-lg font-bold tracking-tight">Voice Sum</h1>
      </div>
      <div class="w-9"></div>
    </div>
  </header>

  <main class="flex-grow w-full max-w-md mx-auto p-4 space-y-4">
    <section class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm space-y-3">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h2 id="h-status" class="text-sm font-bold text-slate-600 uppercase tracking-wider mb-1">Status</h2>
          <p id="status-text" class="text-slate-600 text-sm leading-relaxed">Idle</p>
          <p id="support-text" class="text-slate-400 text-xs mt-1 leading-relaxed"></p>
        </div>
        <div class="text-right shrink-0">
          <div id="lbl-mic" class="text-xs text-slate-400">Mic</div>
          <div id="mic-state" class="text-sm font-bold tabular-nums text-slate-700">-</div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button id="btn-start" class="bg-blue-600 text-white py-3 rounded-xl font-semibold active:scale-95 transition-transform flex items-center justify-center gap-2">
          <i data-lucide="mic" class="w-5 h-5"></i><span id="btn-start-text">Start</span>
        </button>
        <button id="btn-stop" class="bg-slate-100 text-slate-600 py-3 rounded-xl font-semibold active:scale-95 transition-transform flex items-center justify-center gap-2 disabled:opacity-50 disabled:active:scale-100" disabled>
          <i data-lucide="square" class="w-5 h-5"></i><span id="btn-stop-text">Stop</span>
        </button>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <div id="lbl-level" class="text-xs text-slate-400">Mic level</div>
          <div id="lvl-num" class="text-xs font-mono text-slate-500">0%</div>
        </div>
        <div class="mt-1 w-full h-3 rounded-full bg-slate-100 overflow-hidden border border-slate-200">
          <div id="lvl-bar" class="h-full bg-emerald-400 w-0"></div>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-2">
        <div>
          <div class="text-xs text-slate-400">Interim</div>
          <div id="interim" class="mt-1 p-2 rounded-xl bg-slate-50 border border-slate-200 text-sm text-slate-700 font-mono min-h-[2.25rem]"></div>
        </div>
        <div>
          <div class="text-xs text-slate-400">Final</div>
          <div id="final" class="mt-1 p-2 rounded-xl bg-slate-50 border border-slate-200 text-sm text-slate-700 font-mono min-h-[2.25rem]"></div>
        </div>
        <div>
          <div class="flex items-center justify-between">
            <div class="text-xs text-slate-400">Final history</div>
            <button id="btn-clear-history" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-100 text-slate-700 active:scale-95 transition-transform">Clear</button>
          </div>

        </div>
      </div>

      <label class="flex items-center gap-2 text-xs text-slate-500 select-none">
        <input id="toggle-debug" type="checkbox" class="accent-blue-600">
        <span>Debug events</span>
      </label>
    </section>

    <section class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm">
      <div class="flex items-baseline justify-between gap-3">
        <h2 id="h-sum" class="text-sm font-bold text-slate-600 uppercase tracking-wider">Sum</h2>
        <div class="text-xs text-slate-400"><span id="lbl-count">Count</span>: <span id="count" class="tabular-nums">0</span></div>
      </div>
      <div class="mt-2 flex items-end justify-between">
        <div class="text-5xl font-extrabold tabular-nums text-slate-800" id="sum">0</div>
        <div class="text-right">
          <div id="lbl-last" class="text-xs text-slate-400">Last</div>
          <div id="last-added" class="text-lg font-bold tabular-nums text-slate-700">-</div>
        </div>
      </div>

      <div class="mt-4">
        <div class="flex items-center justify-between">
          <div id="lbl-recognized" class="text-xs text-slate-400">Recognized</div>
          <div class="flex items-center gap-2">
            <button id="btn-undo" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-100 text-slate-700 active:scale-95 transition-transform disabled:opacity-50 disabled:active:scale-100" disabled>Undo</button>
            <button id="btn-clear" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-rose-50 text-rose-600 active:scale-95 transition-transform">Clear</button>
          </div>
        </div>
        <div id="numbers-box" class="mt-2 p-3 rounded-xl bg-slate-50 border border-slate-200 text-sm text-slate-700 font-mono leading-relaxed break-words min-h-[3.25rem]"></div>
        <p id="hint" class="text-[11px] text-slate-400 mt-2 leading-relaxed"></p>
      </div>
    </section>

    <section id="debug-panel" class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm hidden">
      <h2 class="text-sm font-bold text-slate-600 uppercase tracking-wider">Events</h2>
      <ul id="dbg-events" class="mt-2 space-y-1 text-xs text-slate-600 font-mono"></ul>
    </section>
  </main>

  <script>
    lucide.createIcons();

    const STR = {
      title: '\u8A9E\u97F3\u52A0\u7E3D',
      hStatus: '\u72C0\u614B',
      hSum: '\u5373\u6642\u52A0\u7E3D',
      idle: '\u5C1A\u672A\u958B\u59CB',
      listening: '\u6B63\u5728\u807D\u53D6\u2026',
      start: '\u958B\u59CB',
      stop: '\u505C\u6B62',
      count: '\u7B46\u6578',
      last: '\u6700\u5F8C\u52A0\u5165',
      recognized: '\u5DF2\u8FA8\u8B58',
      hint: '\u5EFA\u8B70\u6E2C\u8A66\uFF1A\u7528\u4E2D\u6587\u5F9E\u300C\u4E00\u300D\u5FF5\u5230\u300C\u4E09\u5341\u300D\uFF0C\u6BCF\u500B\u6578\u5B57\u9593\u505C\u9813\u7D04 0.5 \u79D2\u3002\uFF08\u652F\u63F4\u6DF7\u5408\u8FA8\u8B58\u932F\u8AA4\uFF0C\u6703\u76E1\u91CF\u62FF\u51FA\u6B63\u78BA\u7684\u6578\u5B57\uFF09',
      srUnsupported: '\u9019\u500B\u700F\u89BD\u5668\u4E0D\u652F\u63F4 SpeechRecognition\uFF08\u5EFA\u8B70\u7528 Chrome/Edge\uFF09\u3002',
      micNeedHttp: '\u63D0\u793A\uFF1A\u7528 file:// \u958B\u555F\u6642\uFF0C\u9EA5\u514B\u98A8\u53EF\u80FD\u88AB\u963B\u64CB\u3002\u8ACB\u7528 `npm run dev` \u5F8C\u958B\u555F http://localhost:5500/voice-sum/ \u6E2C\u8A66\u3002',
      micDenied: '\u9EA5\u514B\u98A8\u6B0A\u9650\u88AB\u62D2\u7D55\uFF0C\u8ACB\u5728\u700F\u89BD\u5668\u4F4D\u7F6E\u5217\u5141\u8A31\u9EA5\u514B\u98A8\u3002',
      micFail: '\u9EA5\u514B\u98A8\u7121\u6CD5\u4F7F\u7528\uFF1A',
      srError: '\u8A9E\u97F3\u8FA8\u8B58\u932F\u8AA4\uFF1A',
      mic: '\u9EA5\u514B\u98A8',
      undo: '\u5FA9\u539F',
      clear: '\u6E05\u7A7A',
    };

    const STORAGE_KEY = 'voice-sum:v3';
    const MAX_FINAL_HISTORY = 12;
    const MAX_EVENTS = 16;
    const ACCEPT_MAX = 30; // keep small for reliability; change here if needed

    const ui = {
      title: document.getElementById('title'),
      hStatus: document.getElementById('h-status'),
      hSum: document.getElementById('h-sum'),
      statusDot: document.getElementById('status-dot'),
      statusText: document.getElementById('status-text'),
      supportText: document.getElementById('support-text'),
      micState: document.getElementById('mic-state'),
      btnStart: document.getElementById('btn-start'),
      btnStop: document.getElementById('btn-stop'),
      btnStartText: document.getElementById('btn-start-text'),
      btnStopText: document.getElementById('btn-stop-text'),
      lvlBar: document.getElementById('lvl-bar'),
      lvlNum: document.getElementById('lvl-num'),
      interim: document.getElementById('interim'),
      final: document.getElementById('final'),
      finalHistory: document.getElementById('final-history'),
      btnClearHistory: document.getElementById('btn-clear-history'),
      toggleDebug: document.getElementById('toggle-debug'),
      debugPanel: document.getElementById('debug-panel'),
      dbgEvents: document.getElementById('dbg-events'),
      sum: document.getElementById('sum'),
      count: document.getElementById('count'),
      lastAdded: document.getElementById('last-added'),
      numbersBox: document.getElementById('numbers-box'),
      hint: document.getElementById('hint'),
      btnUndo: document.getElementById('btn-undo'),
      btnClear: document.getElementById('btn-clear'),
      lblCount: document.getElementById('lbl-count'),
      lblLast: document.getElementById('lbl-last'),
      lblRecognized: document.getElementById('lbl-recognized'),
      lblMic: document.getElementById('lbl-mic'),
    };

    ui.title.textContent = STR.title;
    document.title = STR.title;
    ui.hStatus.textContent = STR.hStatus;
    ui.hSum.textContent = STR.hSum;
    ui.btnStartText.textContent = STR.start;
    ui.btnStopText.textContent = STR.stop;
    ui.btnUndo.textContent = STR.undo;
    ui.btnClear.textContent = STR.clear;
    ui.lblCount.textContent = STR.count;
    ui.lblLast.textContent = STR.last;
    ui.lblRecognized.textContent = STR.recognized;
    ui.lblMic.textContent = STR.mic;
    ui.hint.textContent = STR.hint;

    function fmtNow() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      return `${hh}:${mm}:${ss}`;
    }

    function setStatus(kind, text) {
      ui.statusText.textContent = text;
      const cls = {
        idle: 'bg-white/40',
        listening: 'bg-emerald-300',
        error: 'bg-rose-300'
      }[kind] || 'bg-white/40';
      ui.statusDot.className = `inline-block w-2.5 h-2.5 rounded-full ${cls}`;
    }

    function pushEvent(msg) {
      if (!ui.toggleDebug.checked) return;
      while (ui.dbgEvents.children.length >= MAX_EVENTS) ui.dbgEvents.removeChild(ui.dbgEvents.lastChild);
      const li = document.createElement('li');
      li.textContent = `[${fmtNow()}] ${msg}`;
      ui.dbgEvents.insertBefore(li, ui.dbgEvents.firstChild);
    }

    function pushFinalHistory(text) {
      const li = document.createElement('li');
      li.textContent = `[${fmtNow()}] ${text}`;
      ui.finalHistory.insertBefore(li, ui.finalHistory.firstChild);
      while (ui.finalHistory.children.length > MAX_FINAL_HISTORY) ui.finalHistory.removeChild(ui.finalHistory.lastChild);
    }

    function clampSafePosInt(n) {
      const v = Number(n);
      if (!Number.isFinite(v)) return null;
      if (!Number.isSafeInteger(v)) return null;
      if (v <= 0) return null;
      return v;
    }

    function toHalfWidthDigits(input) {
      return String(input).replace(/[\uFF10-\uFF19]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFF10 + 0x30));
    }

    function normalizeTranscript(input) {
      let s = toHalfWidthDigits(input);
      s = s.replace(/\s+/g, '');
      s = s.replace(/[，,。．.、;；:：!?！？\"“”'()（）\[\]【】{}]/g, '');
      s = s.replace(/兩/g, '二').replace(/俩/g, '二').replace(/倆/g, '二');
      s = s.replace(/幺/g, '一');
      s = s.replace(/廿/g, '二十').replace(/卄/g, '二十');
      s = s.replace(/卅/g, '三十');
      s = s.replace(/一十/g, '十');
      s = s.replace(/第/g, '').replace(/號/g, '').replace(/个/g, '').replace(/個/g, '');
      return s;
    }

    function parseSectionUnder10000(section) {
      const digit = {
        '\u96F6': 0,
        '\u4E00': 1,
        '\u4E8C': 2,
        '\u4E09': 3,
        '\u56DB': 4,
        '\u4E94': 5,
        '\u516D': 6,
        '\u4E03': 7,
        '\u516B': 8,
        '\u4E5D': 9,
      };
      const unit = {
        '\u5341': 10,
        '\u767E': 100,
        '\u5343': 1000,
      };

      let total = 0;
      let currentDigit = null;

      for (let i = 0; i < section.length; i += 1) {
        const ch = section[i];
        if (ch in digit) {
          currentDigit = digit[ch];
          continue;
        }
        if (ch in unit) {
          const u = unit[ch];
          const d = (currentDigit === null) ? 1 : currentDigit;
          total += d * u;
          currentDigit = null;
          continue;
        }
        return null;
      }

      if (currentDigit !== null) total += currentDigit;
      return total;
    }

    function parseChineseNumeral(str) {
      if (!str) return null;
      let s = String(str);
      const allowed = /^[\u96F6\u4E00\u4E8C\u4E09\u56DB\u4E94\u516D\u4E03\u516B\u4E5D\u5341\u767E\u5343\u842C\u5104]+$/;
      if (!allowed.test(s)) return null;

      const splitBy = (input, ch) => {
        const idx = input.indexOf(ch);
        if (idx === -1) return null;
        return { left: input.slice(0, idx), right: input.slice(idx + 1) };
      };

      let total = 0;
      let rest = s;

      const yi = splitBy(rest, '\u5104');
      if (yi) {
        const left = yi.left ? parseChineseNumeral(yi.left) : 1;
        if (left === null) return null;
        total += left * 100000000;
        rest = yi.right;
      }

      const wan = splitBy(rest, '\u842C');
      if (wan) {
        const left = wan.left ? parseSectionUnder10000(wan.left) : 1;
        if (left === null) return null;
        total += left * 10000;
        rest = wan.right;
      }

      const tail = rest ? parseSectionUnder10000(rest) : 0;
      if (tail === null) return null;
      total += tail;

      return clampSafePosInt(total);
    }

    function parseNumbersInOrder(rawTranscript) {
      const s = normalizeTranscript(rawTranscript);
      const out = [];
      const chineseChars = /[\u96F6\u4E00\u4E8C\u4E09\u56DB\u4E94\u516D\u4E03\u516B\u4E5D\u5341\u767E\u5343\u842C\u5104]/;

      let i = 0;
      while (i < s.length) {
        const ch = s[i];

        if (ch >= '0' && ch <= '9') {
          let j = i + 1;
          while (j < s.length && s[j] >= '0' && s[j] <= '9') j++;
          const v = clampSafePosInt(Number(s.slice(i, j)));
          if (v !== null) out.push(v);
          i = j;
          continue;
        }

        if (chineseChars.test(ch)) {
          let j = i + 1;
          while (j < s.length && chineseChars.test(s[j])) j++;
          const run = s.slice(i, j);

          if (!/[\u5341\u767E\u5343\u842C\u5104]/.test(run)) {
            const map = {
              '\u96F6': 0,
              '\u4E00': 1,
              '\u4E8C': 2,
              '\u4E09': 3,
              '\u56DB': 4,
              '\u4E94': 5,
              '\u516D': 6,
              '\u4E03': 7,
              '\u516B': 8,
              '\u4E5D': 9,
            };
            for (const c of run) {
              if (c in map) {
                const v = map[c];
                if (v > 0) out.push(v);
              }
            }
            i = j;
            continue;
          }

          const whole = parseChineseNumeral(run);
          if (whole !== null) {
            out.push(whole);
            i = j;
            continue;
          }

          let advanced = false;
          for (let len = Math.min(12, run.length); len >= 1; len -= 1) {
            const part = run.slice(0, len);
            const v = parseChineseNumeral(part);
            if (v !== null) {
              out.push(v);
              i += len;
              advanced = true;
              break;
            }
          }
          if (advanced) continue;
        }

        i += 1;
      }

      return out;
    }

    const state = {
      items: [], // { value, at }
      recognition: null,
      shouldListen: false,
      session: 0,
      seenFinal: new Set(),
      lastAcceptedByValue: new Map(),
      audio: {
        stream: null,
        ctx: null,
        analyser: null,
        raf: 0,
      },
    };

    function computeSum() {
      return state.items.reduce((acc, it) => acc + it.value, 0);
    }

    function persist() {
      try {
        const payload = {
          v: 3,
          items: state.items.map(it => ({ value: it.value, at: it.at })),
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch {}
    }

    function restore() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (!data || data.v !== 3 || !Array.isArray(data.items)) return;
        state.items = data.items
          .map(it => ({ value: clampSafePosInt(it.value), at: Number(it.at) || Date.now() }))
          .filter(it => it.value !== null);
      } catch {}
    }

    function render() {
      ui.sum.textContent = String(computeSum());
      ui.count.textContent = String(state.items.length);
      const last = state.items.length ? state.items[state.items.length - 1].value : null;
      ui.lastAdded.textContent = last === null ? '-' : String(last);
      ui.btnUndo.disabled = state.items.length === 0;
      ui.numbersBox.textContent = state.items.length ? state.items.map(it => String(it.value)).join(', ') : '\uFF08\u5C1A\u7121\uFF09';
      persist();
    }

    function addValue(value) {
      const v0 = clampSafePosInt(value);
      if (v0 === null) return false;
      if (v0 > ACCEPT_MAX) return false;

      const now = Date.now();
      const lastAt = state.lastAcceptedByValue.get(v0) || 0;
      if (now - lastAt < 900) return false;

      state.lastAcceptedByValue.set(v0, now);
      state.items.push({ value: v0, at: now });
      render();
      return true;
    }

    function applyTranscript(transcript) {
      const candidates = parseNumbersInOrder(transcript)
        .map(n => clampSafePosInt(n))
        .filter(n => n !== null && n <= ACCEPT_MAX);

      if (!candidates.length) return;

      // Heuristic: if candidates contains the next expected (based on last value), accept in that order first.
      const last = state.items.length ? state.items[state.items.length - 1].value : 0;
      const expected = last + 1;
      const ordered = [];
      const remaining = candidates.slice();

      if (expected >= 1 && expected <= ACCEPT_MAX) {
        for (let i = 0; i < remaining.length; i += 1) {
          if (remaining[i] === expected) {
            ordered.push(expected);
            remaining.splice(i, 1);
            break;
          }
        }
      }
      for (const c of remaining) ordered.push(c);

      for (const n of ordered) addValue(n);
    }

    function setListeningUi(on) {
      ui.btnStart.disabled = on;
      ui.btnStop.disabled = !on;
      setStatus(on ? 'listening' : 'idle', on ? STR.listening : STR.idle);
    }

    function stopAudioMeter() {
      if (state.audio.raf) {
        cancelAnimationFrame(state.audio.raf);
        state.audio.raf = 0;
      }
      if (state.audio.stream) {
        for (const t of state.audio.stream.getTracks()) t.stop();
      }
      state.audio.stream = null;
      if (state.audio.ctx) {
        try { state.audio.ctx.close(); } catch {}
      }
      state.audio.ctx = null;
      state.audio.analyser = null;
      ui.lvlBar.style.width = '0%';
      ui.lvlNum.textContent = '0%';
      ui.micState.textContent = '-';
    }

    async function startAudioMeter() {
      const md = navigator.mediaDevices;
      if (!md || !md.getUserMedia) throw new Error('getUserMedia unsupported');

      const stream = await md.getUserMedia({ audio: true });
      state.audio.stream = stream;

      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) throw new Error('AudioContext unsupported');
      const ctx = new AudioCtx();
      state.audio.ctx = ctx;
      try { await ctx.resume(); } catch {}

      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      state.audio.analyser = analyser;

      const src = ctx.createMediaStreamSource(stream);
      src.connect(analyser);

      const buf = new Uint8Array(analyser.fftSize);

      const tick = () => {
        if (!state.audio.analyser) return;
        state.audio.analyser.getByteTimeDomainData(buf);
        let sumSq = 0;
        for (let i = 0; i < buf.length; i += 1) {
          const x = (buf[i] - 128) / 128;
          sumSq += x * x;
        }
        const rms = Math.sqrt(sumSq / buf.length);
        const pct = Math.max(0, Math.min(100, Math.round(rms * 240)));
        ui.lvlBar.style.width = `${pct}%`;
        ui.lvlNum.textContent = `${pct}%`;
        state.audio.raf = requestAnimationFrame(tick);
      };

      ui.micState.textContent = 'OK';
      tick();
    }

    function createRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      const r = new SR();
      r.lang = 'zh-TW';
      r.continuous = true;
      r.interimResults = true;
      r.maxAlternatives = 3;
      return r;
    }

    function safeStopRecognition() {
      state.shouldListen = false;
      if (state.recognition) {
        try { state.recognition.onresult = null; } catch {}
        try { state.recognition.onerror = null; } catch {}
        try { state.recognition.onend = null; } catch {}
        try { state.recognition.stop(); } catch {}
      }
      state.recognition = null;
      stopAudioMeter();
      setListeningUi(false);
      pushEvent('stop');
    }

    async function startListening() {
      ui.interim.textContent = '';
      ui.final.textContent = '';

      if (window.location.protocol === 'file:') {
        ui.supportText.textContent = STR.micNeedHttp;
      } else {
        ui.supportText.textContent = '';
      }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        setStatus('error', STR.srUnsupported);
        return;
      }

      try {
        await startAudioMeter();
      } catch (e) {
        const name = String(e && (e.name || e.message) || '');
        ui.micState.textContent = 'ERR';
        setStatus('error', name.includes('NotAllowed') ? STR.micDenied : (STR.micFail + name));
        return;
      }

      state.session += 1;
      state.seenFinal = new Set();

      const recognition = createRecognition();
      if (!recognition) {
        setStatus('error', STR.srUnsupported);
        return;
      }

      state.recognition = recognition;
      state.shouldListen = true;
      setListeningUi(true);

      recognition.onstart = () => pushEvent('sr:start');
      recognition.onaudiostart = () => pushEvent('sr:audio-start');
      recognition.onspeechstart = () => pushEvent('sr:speech-start');
      recognition.onspeechend = () => pushEvent('sr:speech-end');
      recognition.onaudioend = () => pushEvent('sr:audio-end');
      recognition.onnomatch = () => pushEvent('sr:nomatch');

      recognition.onresult = (event) => {
        const lastIdx = event.results.length - 1;
        if (lastIdx >= 0) {
          const last = event.results[lastIdx];
          if (last && !last.isFinal) {
            const interim = last[0] && last[0].transcript || '';
            ui.interim.textContent = interim.trim();
          }
        }

        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const res = event.results[i];
          if (!res || !res.isFinal) continue;
          const transcript = String(res[0] && res[0].transcript || '').trim();
          if (!transcript) continue;

          const key = `${state.session}:${i}:${transcript}`;
          if (state.seenFinal.has(key)) continue;
          state.seenFinal.add(key);

          ui.final.textContent = transcript;
          pushFinalHistory(transcript);
          pushEvent(`sr:final "${transcript}"`);
          applyTranscript(transcript);
        }
      };

      recognition.onerror = (event) => {
        const err = event && event.error || 'unknown';
        pushEvent(`sr:error ${err}`);
        setStatus('error', STR.srError + err);
        safeStopRecognition();
      };

      recognition.onend = () => {
        pushEvent('sr:end');
        if (!state.shouldListen) return;
        setTimeout(() => {
          if (!state.shouldListen) return;
          try {
            recognition.start();
            pushEvent('sr:restart');
          } catch {
            pushEvent('sr:restart-failed');
            safeStopRecognition();
          }
        }, 200);
      };

      try {
        recognition.start();
      } catch (e) {
        pushEvent('sr:start-failed');
        safeStopRecognition();
      }
    }

    function updateSupportText() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const supported = !!SR;
      const proto = window.location.protocol;
      const host = window.location.hostname;
      const secure = window.isSecureContext;
      const base = `SpeechRecognition=${supported ? 'yes' : 'no'}, protocol=${proto}, host=${host || '-'}, secureContext=${secure ? 'yes' : 'no'}`;
      ui.supportText.textContent = base;
      if (proto === 'file:') ui.supportText.textContent = base + `\n` + STR.micNeedHttp;
    }

    ui.btnStart.addEventListener('click', () => { startListening(); });
    ui.btnStop.addEventListener('click', () => { safeStopRecognition(); });
    ui.btnUndo.addEventListener('click', () => {
      state.items.pop();
      render();
    });
    ui.btnClear.addEventListener('click', () => {
      state.items = [];
      state.lastAcceptedByValue = new Map();
      render();
    });
    ui.btnClearHistory.addEventListener('click', () => {
      ui.finalHistory.innerHTML = '';
      ui.final.textContent = '';
      ui.interim.textContent = '';
    });

    ui.toggleDebug.addEventListener('change', () => {
      ui.debugPanel.classList.toggle('hidden', !ui.toggleDebug.checked);
    });

    restore();
    updateSupportText();
    render();
    setStatus('idle', STR.idle);
  </script>
</body>
</html>

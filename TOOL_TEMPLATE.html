<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>你的工具名稱</title>

  <!-- 第三方 CDN 請鎖定版本，不要使用 @latest -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.542.0"></script>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='8' fill='%233b82f6'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    ::-webkit-scrollbar { width: 0; background: transparent; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <script>
    /*
      自動註冊規則（請保留）
      - 每個工具放在根目錄下單一資料夾，例如 /your-tool/
      - 該資料夾至少有 index.html
      - 工具頁維持單檔，不依賴額外 bootstrap 檔案
      - id 建議使用 kebab-case，例如 my-score-tool
    */
    (function autoRegister() {
      let appPath = window.location.pathname;
      if (appPath.endsWith('index.html')) appPath = appPath.replace('index.html', '');
      if (!appPath.endsWith('/')) appPath += '/';
      if (appPath === '/') return;

      // 讓工具內「返回首頁」在本機、Vercel、GitHub Pages 都指向正確路徑
      const launcherPath = appPath.replace(/[^/]+\/$/, '');
      const normalizedLauncherPath = launcherPath || '/';

      function configureHomeLinkAndProbe() {
        const homeLinks = Array.from(document.querySelectorAll('[data-home-link]'));
        const spacer = document.getElementById('header-spacer');

        homeLinks.forEach(el => {
          el.setAttribute('href', normalizedLauncherPath);
        });

        // 本機直接開啟 (file://) 時，無法可靠探測首頁是否存在；保持隱藏，當作單頁模式。
        if (window.location.protocol === 'file:') return;

        const probeUrl = normalizedLauncherPath.endsWith('/')
          ? `${normalizedLauncherPath}index.html`
          : `${normalizedLauncherPath}/index.html`;

        const revealHome = () => {
          homeLinks.forEach(el => {
            el.classList.remove('invisible', 'pointer-events-none');
          });
          if (spacer) spacer.classList.remove('hidden');
        };

        fetch(probeUrl, { method: 'HEAD' })
          .then(res => {
            if (res.ok) {
              revealHome();
              return;
            }
            // 某些靜態主機可能不支援 HEAD，改用 GET 當備援（只要成功就顯示）。
            if (res.status === 405) {
              return fetch(probeUrl, { method: 'GET' }).then(r => {
                if (r.ok) revealHome();
              });
            }
          })
          .catch(() => {
            // 網路錯誤 / 404 / CORS 等情況：保持隱藏 => 單頁模式
          });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', configureHomeLinkAndProbe, { once: true });
      } else {
        configureHomeLinkAndProbe();
      }

      const appMeta = {
        id: 'your-tool-id',
        name: '你的工具名稱',
        nameZh: '你的工具名稱',
        nameEn: 'Your Tool Name',
        path: appPath,
        icon: 'box',
        color: 'blue' // blue|emerald|amber|rose|purple
      };

      const storageKey = 'myAppLauncherStorage';
      const launcherData = JSON.parse(localStorage.getItem(storageKey) || '[]');
      const existingIndex = launcherData.findIndex(app => app.path === appMeta.path);
      if (existingIndex === -1) launcherData.push(appMeta);
      else launcherData[existingIndex] = { ...launcherData[existingIndex], ...appMeta };
      localStorage.setItem(storageKey, JSON.stringify(launcherData));
    })();
  </script>

  <!--
    設計與實作約束（給其他 AI）
    1) 視覺風格跟首頁一致：淺底、藍色主題、圓角、低干擾動畫
    2) 手機優先，內容容器建議 max-w-md
    3) 資料保存使用 localStorage 或 IndexedDB
    4) 不要引入建置流程與後端 API 依賴
  -->

  <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-20">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <a href="/" data-home-link class="p-2 -ml-2 hover:bg-blue-700 rounded-full transition-colors invisible pointer-events-none">
        <i data-lucide="home" class="w-5 h-5"></i>
      </a>
      <h1 class="text-lg font-bold tracking-tight">你的工具名稱</h1>
      <div class="w-9"></div>
    </div>
  </header>

  <main class="flex-grow w-full max-w-md mx-auto p-4">
    <section class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm">
      <h2 class="text-sm font-bold text-slate-600 uppercase tracking-wider mb-3">工具區塊</h2>
      <p class="text-slate-500 text-sm mb-4">在這裡開始實作你的功能。建議先做好手機版排版。</p>
      <button id="btn-example" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold active:scale-95 transition-transform">
        範例按鈕
      </button>
    </section>
  </main>

  <script>
    lucide.createIcons();
    document.getElementById('btn-example').addEventListener('click', () => {
      alert('你已完成 TOOL_TEMPLATE 的基本初始化。');
    });
  </script>
</body>
</html>
